<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter Film</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Ajouter un film</h1>

    <form id="filmForm">
      <input type="text" id="titre" placeholder="Titre" required>
      <input type="text" id="genre" placeholder="Genre" required>
      <input type="number" id="duree" placeholder="Durée (min)" required>
      <input type="text" id="classification" placeholder="Classification" required>
      <textarea id="resume" placeholder="Résumé"></textarea>

      <button type="submit">Ajouter</button>
    </form>

    <p id="message"></p>
  </div>

  <script src="ajouter-film.js"></script>
</body>
</html>
