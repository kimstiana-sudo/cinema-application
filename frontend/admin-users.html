<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs - CinéMax Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-title">🎬 CinéMax Admin</h1>
      <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="agent-films.html">Films</a>
        <a href="agent-reservations.html">Réservations</a>
        <button id="logoutBtn" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="page-card">
      <div class="section-title">
        <h1>👥 Gestion des Utilisateurs</h1>
        <span id="totalCount" style="color:#888;font-size:14px;"></span>
      </div>
      <div id="msgUser"></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par nom, email..." oninput="filterUsers()">
        <select id="filterRole" onchange="filterUsers()">
          <option value="">Tous les rôles</option>
          <option value="client">Client</option>
          <option value="agent">Agent</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div id="usersList"><div class="loading">Chargement...</div></div>
    </div>
  </div>

  <div id="userModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Modifier l'utilisateur</h3>
      <div id="msgModal"></div>
      <div class="form-group"><label>Nom</label><input type="text" id="editNom"></div>
      <div class="form-group"><label>Prénom</label><input type="text" id="editPrenom"></div>
      <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
      <div class="form-group"><label>Rôle</label>
        <select id="editRole">
          <option value="1">Client</option>
          <option value="2">Agent</option>
          <option value="3">Administrateur</option>
        </select>
      </div>
      <div class="form-group"><label>Réservations max</label><input type="number" id="editMaxResv" min="1" max="20"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" onclick="saveUser()">💾 Enregistrer</button>
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      </div>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');
    if (!user || !token) window.location.href = 'auth.html';
    const roleId = user.roleId ?? user.role?.id;
    if (roleId != 3) window.location.href = 'index.html';
    function logout() { localStorage.clear(); window.location.href = 'auth.html'; }

    let allUsers = [], editingId = null;

    function showMsg(id, msg, isError=false) {
      const el=document.getElementById(id); el.className='alert '+(isError?'alert-danger':'alert-success');
      el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',4000);
    }

    async function loadUsers() {
      const res = await fetch('/api/users', { headers: { Authorization:`Bearer ${token}` } });
      allUsers = await res.json();
      document.getElementById('totalCount').textContent = `${allUsers.length} utilisateur(s)`;
      renderUsers(allUsers);
    }

    function filterUsers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const role = document.getElementById('filterRole').value;
      let filtered = allUsers;
      if (role) filtered = filtered.filter(u => (u.role?.nom??'client').toLowerCase() === role);
      if (q) filtered = filtered.filter(u =>
        (u.nom??'').toLowerCase().includes(q) ||
        (u.prenom??'').toLowerCase().includes(q) ||
        (u.email??'').toLowerCase().includes(q)
      );
      renderUsers(filtered);
    }

    function renderUsers(users) {
      if (!users.length) { document.getElementById('usersList').innerHTML='<div class="empty-state"><div class="icon">👥</div><p>Aucun utilisateur trouvé.</p></div>'; return; }
      document.getElementById('usersList').innerHTML = `<table class="data-table">
        <thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Réserv. max</th><th>Créé le</th><th>Actions</th></tr></thead>
        <tbody>${users.map(u=>`
          <tr>
            <td><strong>${u.prenom??''} ${u.nom??''}</strong></td>
            <td>${u.email}</td>
            <td><span class="badge badge-${(u.role?.nom??'client').toLowerCase()}">${u.role?.nom??'Client'}</span></td>
            <td>${u.max_reservations??3}</td>
            <td>${new Date(u.createdAt).toLocaleDateString('fr-FR')}</td>
            <td class="table-actions">
              <button class="btn btn-warning btn-sm" onclick="openEdit(${u.id})">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})" ${u.id===user.id?'disabled title="Impossible de supprimer votre propre compte"':''}>🗑️</button>
            </td>
          </tr>`).join('')}
        </tbody></table>`;
    }

    function openEdit(id) {
      const u = allUsers.find(u=>u.id===id); if(!u) return;
      editingId = id;
      document.getElementById('editNom').value = u.nom??'';
      document.getElementById('editPrenom').value = u.prenom??'';
      document.getElementById('editEmail').value = u.email??'';
      document.getElementById('editRole').value = u.roleId??1;
      document.getElementById('editMaxResv').value = u.max_reservations??3;
      document.getElementById('userModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('userModal').style.display='none'; editingId=null; }

    async function saveUser() {
      const body = {
        nom: document.getElementById('editNom').value,
        prenom: document.getElementById('editPrenom').value,
        email: document.getElementById('editEmail').value,
        roleId: parseInt(document.getElementById('editRole').value),
        max_reservations: parseInt(document.getElementById('editMaxResv').value)
      };
      const res = await fetch(`/api/users/${editingId}`, {
        method:'PUT', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body:JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) { closeModal(); showMsg('msgUser','✅ Utilisateur mis à jour !'); loadUsers(); }
      else showMsg('msgModal', data.message||'Erreur', true);
    }

    async function deleteUser(id) {
      if (!confirm('Supprimer cet utilisateur ? Cette action est irréversible.')) return;
      const res = await fetch(`/api/users/${id}`, { method:'DELETE', headers:{Authorization:`Bearer ${token}`} });
      if (res.ok) { showMsg('msgUser','✅ Utilisateur supprimé'); loadUsers(); }
      else { const d=await res.json(); showMsg('msgUser', d.message||'Erreur', true); }
    }

    loadUsers();
  </script>
</body>
</html>
