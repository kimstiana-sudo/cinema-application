<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - CinéMax</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-title">🎬 CinéMax Admin</h1>
      <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="admin-users.html">Utilisateurs</a>
        <a href="agent-films.html">Films</a>
        <a href="agent-reservations.html">Réservations</a>
        <button id="logoutBtn" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </nav>
  <div class="container">
    <h1>📊 Tableau de bord administrateur</h1>

    <div class="admin-grid">
      <div class="admin-stat blue"><div class="num" id="totalUsers">—</div><div class="lbl">Utilisateurs</div></div>
      <div class="admin-stat green"><div class="num" id="totalFilms">—</div><div class="lbl">Films</div></div>
      <div class="admin-stat orange"><div class="num" id="totalResv">—</div><div class="lbl">Réservations</div></div>
      <div class="admin-stat red"><div class="num" id="totalRevenu">—</div><div class="lbl">Revenus ($)</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <div class="page-card">
        <h2>👥 Répartition des utilisateurs</h2>
        <div id="usersByRole"></div>
      </div>
      <div class="page-card">
        <h2>📈 Réservations par statut</h2>
        <div id="resvByStatut"></div>
      </div>
    </div>

    <div class="page-card" style="margin-top:24px;">
      <h2>🕐 Dernières réservations</h2>
      <div id="lastResv"><div class="loading">Chargement...</div></div>
    </div>

    <div class="page-card" style="margin-top:24px;">
      <h2>💰 Statistiques paiements</h2>
      <div id="paiementStats"></div>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');
    if (!user || !token) window.location.href = 'auth.html';
    const roleId = user.roleId ?? user.role?.id;
    if (roleId != 3) window.location.href = 'index.html';
    function logout() { localStorage.clear(); window.location.href = 'auth.html'; }

    function bar(label, value, max, color) {
      const pct = max > 0 ? Math.round(value/max*100) : 0;
      return `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;">
          <span>${label}</span><span><strong>${value}</strong></span>
        </div>
        <div style="background:#f0f0f0;border-radius:4px;height:10px;">
          <div style="width:${pct}%;background:${color};border-radius:4px;height:10px;transition:width 0.6s;"></div>
        </div>
      </div>`;
    }

    async function loadDashboard() {
      try {
        const [usersRes, filmsRes, resvRes, paiRes] = await Promise.all([
          fetch('/api/users', { headers: { Authorization:`Bearer ${token}` } }),
          fetch('/api/films'),
          fetch('/api/reservations', { headers: { Authorization:`Bearer ${token}` } }),
          fetch('/api/paiements/stats', { headers: { Authorization:`Bearer ${token}` } }).catch(()=>({ json:()=>[] }))
        ]);
        const users = await usersRes.json();
        const films = await filmsRes.json();
        const resv = await resvRes.json();
        const pais = await paiRes.json().catch(()=>[]);

        document.getElementById('totalUsers').textContent = users.length ?? 0;
        document.getElementById('totalFilms').textContent = films.length ?? 0;
        document.getElementById('totalResv').textContent = Array.isArray(resv) ? resv.length : 0;

        // Revenus
        const revenu = Array.isArray(pais) ? pais.filter(p=>p.statut==='paye').reduce((acc,p)=>acc+(parseFloat(p.total)||0),0) : 0;
        document.getElementById('totalRevenu').textContent = revenu.toFixed(2);

        // Users by role
        const roleCount = {};
        users.forEach(u => { const r=u.role?.nom??'client'; roleCount[r]=(roleCount[r]||0)+1; });
        const colors = { client:'#007bff', agent:'#28a745', admin:'#e63946' };
        document.getElementById('usersByRole').innerHTML = Object.entries(roleCount).map(([r,c])=>bar(r,c,users.length,colors[r]||'#888')).join('');

        // Resv by statut
        if (Array.isArray(resv)) {
          const statutCount = {};
          resv.forEach(r => { statutCount[r.statut]=(statutCount[r.statut]||0)+1; });
          const sc = { CONFIRMEE:'#ffc107', PAYEE:'#28a745', ANNULEE:'#dc3545' };
          document.getElementById('resvByStatut').innerHTML = Object.entries(statutCount).map(([s,c])=>bar(s,c,resv.length,sc[s]||'#888')).join('');

          // Last 5
          const last = [...resv].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
          document.getElementById('lastResv').innerHTML = last.length ? `<table class="data-table">
            <thead><tr><th>Client</th><th>Film</th><th>Date</th><th>Statut</th></tr></thead>
            <tbody>${last.map(r=>`<tr>
              <td>${r.utilisateur?.prenom??''} ${r.utilisateur?.nom??''}</td>
              <td>${r.seance?.film?.titre??'—'}</td>
              <td>${new Date(r.date_reservation??r.createdAt).toLocaleString('fr-FR')}</td>
              <td><span class="badge badge-${r.statut?.toLowerCase()}">${r.statut}</span></td>
            </tr>`).join('')}</tbody></table>` : '<p>Aucune réservation récente</p>';
        }

        // Paiements
        if (Array.isArray(pais) && pais.length) {
          document.getElementById('paiementStats').innerHTML = `<table class="data-table">
            <thead><tr><th>Statut</th><th>Nombre</th><th>Total ($)</th></tr></thead>
            <tbody>${pais.map(p=>`<tr><td>${p.statut}</td><td>${p.count}</td><td>${parseFloat(p.total||0).toFixed(2)}</td></tr>`).join('')}</tbody>
          </table>`;
        } else {
          document.getElementById('paiementStats').innerHTML = '<p style="color:#888">Aucune donnée de paiement disponible.</p>';
        }
      } catch(e) {
        console.error(e);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
