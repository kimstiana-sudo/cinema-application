<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - CinéMax</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div style="width:100%;max-width:900px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:3rem;">🎬</div>
        <h1 style="color:white;font-size:2rem;margin:8px 0;">CinéMax</h1>
        <p style="color:rgba(255,255,255,0.7);">Votre plateforme de réservation de billets</p>
      </div>
      <div id="message"></div>
      <div class="auth-forms">
        <div class="auth-section">
          <h2>🔑 Connexion</h2>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
          </div>
          <button class="btn btn-primary btn-lg" onclick="login()">Se connecter</button>
        </div>
        <div class="auth-section">
          <h2>📝 Créer un compte</h2>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" id="nom" placeholder="Votre nom">
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="prenom" placeholder="Votre prénom">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailRegister" placeholder="votre@email.com">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="passwordRegister" placeholder="Minimum 6 caractères">
          </div>
          <button class="btn btn-success btn-lg" onclick="register()">Créer mon compte</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showMsg(msg, isError=true) {
      const el = document.getElementById('message');
      el.className = 'alert '+(isError?'alert-danger':'alert-success');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(()=>el.style.display='none',5000);
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) { showMsg('Veuillez remplir tous les champs.'); return; }
      try {
        const res = await fetch('/api/connexion', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('token', data.token);
          window.location.href = 'index.html';
        } else showMsg(data.message || 'Email ou mot de passe incorrect.');
      } catch(e) { showMsg('Erreur de connexion au serveur.'); }
    }

    async function register() {
      const nom=document.getElementById('nom').value;
      const prenom=document.getElementById('prenom').value;
      const email=document.getElementById('emailRegister').value;
      const password=document.getElementById('passwordRegister').value;
      if (!nom||!prenom||!email||!password) { showMsg('Veuillez remplir tous les champs.'); return; }
      if (password.length < 6) { showMsg('Le mot de passe doit avoir au moins 6 caractères.'); return; }
      try {
        const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nom,prenom,email,password}) });
        const data = await res.json();
        if (res.ok) {
          showMsg('✅ Compte créé ! Vous pouvez maintenant vous connecter.', false);
          document.getElementById('email').value = email;
        } else showMsg(data.message || 'Erreur lors de la création du compte.');
      } catch(e) { showMsg('Erreur de connexion au serveur.'); }
    }

    document.addEventListener('keypress', e => { if(e.key==='Enter') login(); });
  </script>
</body>
</html>
