<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Billets - CinéMax</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-title">🎬 CinéMax</h1>
      <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="films.html">Films</a>
        <a href="reservation.html">Mes réservations</a>
        <a href="profil.html">Mon profil</a>
        <button id="logoutBtn" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="page-card">
      <div class="section-title">
        <h1>🎟️ Mes Billets</h1>
        <span id="billetsCount" style="color:#888;font-size:14px;"></span>
      </div>
      <div id="billetsList"><div class="loading">Chargement de vos billets...</div></div>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');
    if (!user || !token) window.location.href = 'auth.html';
    function logout() { localStorage.clear(); window.location.href = 'auth.html'; }

    async function loadBillets() {
      try {
        const res = await fetch('/api/billets/user', { headers: { Authorization: `Bearer ${token}` } });
        const billets = await res.json();
        const container = document.getElementById('billetsList');
        document.getElementById('billetsCount').textContent = `${billets.length} billet(s)`;
        if (!billets.length) {
          container.innerHTML = '<div class="empty-state"><div class="icon">🎟️</div><p>Vous n\'avez pas encore de billets.<br>Faites une réservation et payez pour obtenir vos billets !</p><a href="films.html" class="btn btn-primary" style="margin-top:14px;">Voir les films</a></div>';
          return;
        }
        container.innerHTML = billets.map(b => {
          const seance = b.reservation?.seance ?? b.seance;
          const film = seance?.film;
          const dateSeance = seance ? new Date(seance.dateHeure).toLocaleString('fr-FR') : 'N/A';
          const places = b.reservation?.places?.map(p => `Rang ${p.rang} - Siège ${p.numero}`).join(', ') ?? 'N/A';
          return `
          <div class="billet-card">
            <div class="billet-header">
              <div>
                <h3 style="margin:0 0 4px;">${film?.titre ?? 'Film'}</h3>
                <div style="font-size:13px;color:#888;">Billet valide</div>
              </div>
              <div class="billet-qr-placeholder">🎫<br>BILLET<br>VALIDE</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;">
              <div><strong>📅 Date</strong><br>${dateSeance}</div>
              <div><strong>🏛️ Salle</strong><br>${seance?.salle?.nom ?? 'N/A'}</div>
              <div><strong>💺 Places</strong><br>${places}</div>
              <div><strong>💰 Prix/place</strong><br>${seance?.prix ?? 'N/A'} $</div>
            </div>
            <div style="margin-top:16px;padding-top:14px;border-top:1px dashed #ddd;">
              <code class="billet-code">${b.code_billet}</code>
            </div>
            <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
              <button class="btn btn-primary btn-sm" onclick="printBillet('${b.code_billet}', '${film?.titre ?? 'Film'}', '${dateSeance}', '${seance?.salle?.nom ?? ''}', '${places}', ${seance?.prix ?? 0})">🖨️ Imprimer</button>
            </div>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('billetsList').innerHTML = '<div class="alert alert-danger">Erreur lors du chargement des billets.</div>';
      }
    }

    function printBillet(code, film, date, salle, places, prix) {
      const w = window.open('', '_blank', 'width=600,height=700');
      w.document.write(`<!DOCTYPE html><html><head><title>Billet - ${film}</title>
      <style>
        body{font-family:Arial,sans-serif;max-width:500px;margin:30px auto;padding:20px;}
        .header{background:#1a1a2e;color:white;padding:20px;text-align:center;border-radius:8px 8px 0 0;}
        .body{border:2px solid #1a1a2e;padding:20px;border-radius:0 0 8px 8px;}
        .code{font-family:monospace;background:#f0f0f0;padding:8px;border-radius:4px;font-size:14px;word-break:break-all;}
        .field{margin:12px 0;}
        .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;}
        .value{font-size:16px;font-weight:700;}
        .footer{text-align:center;margin-top:20px;color:#888;font-size:12px;}
        @media print{.btn{display:none!important;}}
      </style></head><body>
      <div class="header"><h2>🎬 CinéMax</h2><p>BILLET D'ENTRÉE</p></div>
      <div class="body">
        <div class="field"><div class="label">Film</div><div class="value">${film}</div></div>
        <div class="field"><div class="label">Date & Heure</div><div class="value">${date}</div></div>
        <div class="field"><div class="label">Salle</div><div class="value">${salle}</div></div>
        <div class="field"><div class="label">Places</div><div class="value">${places}</div></div>
        <div class="field"><div class="label">Code billet</div><div class="code">${code}</div></div>
      </div>
      <div class="footer">Présentez ce billet à l'entrée. Bonne séance !</div>
      <br><button class="btn" onclick="window.print()" style="background:#e63946;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;width:100%;font-size:16px;">🖨️ Imprimer</button>
      </body></html>`);
      w.document.close();
    }

    loadBillets();
  </script>
</body>
</html>
